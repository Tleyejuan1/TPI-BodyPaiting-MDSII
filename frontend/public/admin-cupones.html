<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cupones Club</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen flex flex-col uppercase text-xs tracking-wider" onload="cargarCuponesVendedor(); refrescarSelectorClientes();">

    <header class="bg-white border-b border-gray-200 h-20 flex justify-between items-center px-8 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-purple-600 text-white rounded-full flex items-center justify-center font-bold text-sm">BA</div>
            <h1 class="font-bold text-gray-900 tracking-widest text-sm">Consola Administrativa</h1>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full flex-grow space-y-6">
        <nav class="bg-white border-b border-gray-200 flex flex-wrap text-xs font-medium uppercase tracking-wider">
            <a href="admin-dashboard.html" class="p-4 text-gray-400 hover:text-gray-600 flex items-center gap-2"><i class="fa-solid fa-warehouse"></i> Inventario</a>
            <a href="admin-alta-productos.html" class="p-4 text-gray-400 hover:text-gray-600 flex items-center gap-2"><i class="fa-solid fa-square-plus"></i> Publicar Insumo</a>
            <a href="admin-logistica.html" class="p-4 text-gray-400 hover:text-gray-600 flex items-center gap-2"><i class="fa-solid fa-truck-ramp-box"></i> Envíos</a>
            <a href="admin-cupones.html" class="p-4 text-purple-600 border-b-2 border-purple-600 flex items-center gap-2 font-bold"><i class="fa-solid fa-ticket"></i> Cupones Club</a>
            <a href="admin-porfolio.html" class="p-4 text-gray-400 hover:text-gray-600 flex items-center gap-2"><i class="fa-solid fa-photo-film"></i> Porfolio Videos</a>
        </nav>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 border border-gray-200 rounded-sm shadow-sm space-y-4 h-fit">
                <div class="text-sm font-bold border-b pb-2 text-purple-600"><i class="fa-solid fa-receipt"></i> Generar Cupón</div>
                <form id="form-alta-cupon" onsubmit="ejecutarAltaCupon(event)" class="space-y-3">
                    <div>
                        <label class="block font-bold text-gray-600 mb-1 uppercase">Código</label>
                        <input type="text" id="cup-codigo" required placeholder="Ej: BENEFICIO-VIP" class="w-full border p-2.5 bg-white rounded-sm font-mono font-bold uppercase focus:border-purple-600 outline-none">
                    </div>
                    <div>
                        <label class="block font-bold text-gray-600 mb-1 uppercase">Destinatario</label>
                        <select id="cup-cliente-select" class="w-full border p-2.5 bg-white rounded-sm font-medium focus:border-purple-600 outline-none"></select>
                    </div>
                    <div>
                        <label class="block font-bold text-gray-600 mb-1 uppercase">Monto ($)</label>
                        <input type="number" id="cup-monto" required placeholder="500" class="w-full border p-2.5 bg-white rounded-sm font-bold text-gray-900 focus:border-purple-600 outline-none">
                    </div>
                    <div>
                        <label class="block font-bold text-gray-600 mb-1 uppercase">Límite de Usos Permitidos</label>
                        <input type="number" id="cup-usos-limite" min="1" value="1" required placeholder="1" class="w-full border p-2.5 bg-white rounded-sm font-bold text-gray-900 focus:border-purple-600 outline-none font-mono">
                    </div>
                    <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold uppercase py-3 rounded-sm tracking-widest cursor-pointer transition">Asignar Crédito</button>
                </form>
            </div>

            <div class="bg-white border border-gray-200 rounded-sm shadow-sm overflow-hidden md:col-span-2">
                <div class="p-4 border-b bg-gray-50 font-bold text-gray-700">Historial de Cupones Activos</div>
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-200 font-bold text-gray-400 text-[10px]">
                            <th class="p-4">Código</th>
                            <th class="p-4">Cliente Asignado</th>
                            <th class="p-4">Monto</th>
                            <th class="p-4">Cupos Disponibles</th>
                            <th class="p-4">Estado</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-cupones-vendedor" class="divide-y font-medium text-gray-600 text-[11px] normal-case"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="mail-service.js"></script>
    <script src="admin-controller.js"></script>
</body>
</html>
