<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Body Art - Vídeos e Historias</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col justify-between" onload="chequearSesionGlobal()">

    <!-- MENÚ DE NAVEGACIÓN -->
    <nav class="bg-white border-b border-gray-100 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex-shrink-0 flex items-center">
                    <a href="index.html" class="flex items-center gap-2 cursor-pointer">
                        <div class="w-12 h-12 rounded-full border-2 border-purple-600 flex items-center justify-center font-bold text-gray-800 text-sm">BODY</div>
                        <span class="font-serif tracking-widest text-xl font-bold hidden sm:block">ART</span>
                    </a>
                </div>
                <div class="hidden md:flex space-x-8 text-xs font-medium tracking-widest uppercase">
                    <a href="index.html" class="text-gray-500 hover:text-purple-600 transition">Hogar</a>
                    <a href="productos.html" class="text-gray-500 hover:text-purple-600 transition">Comercio / Kits</a>
                    <a href="videos.html" class="text-purple-600 font-bold transition">Vídeos e Historias</a>
                    <a href="contacto.html" class="text-gray-500 hover:text-purple-600 transition">Contacto y Reservas</a>
                </div>
                <div class="flex items-center space-x-6">
                    <a href="productos.html?ver-carrito=true" class="relative p-2 text-gray-600 hover:text-purple-600 transition cursor-pointer">
                        <i class="fa-solid fa-shopping-cart text-xl"></i>
                        <span id="cart-badge" class="absolute -top-1 -right-1 hidden items-center justify-center px-2 py-0.5 text-xs font-bold leading-none text-white bg-purple-600 rounded-full">0</span>
                    </a>
                    <a href="login.html" id="nav-login-btn" class="hidden md:flex items-center gap-2 text-xs font-medium tracking-widest uppercase text-gray-600 hover:text-purple-600 border border-gray-300 rounded-full px-4 py-2 hover:border-purple-600 cursor-pointer">
                        <i class="fa-solid fa-user"></i>
                        <span id="nav-login-text">Ingresar</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="flex-grow max-w-7xl w-full mx-auto px-4 py-12">
        <div class="text-center mb-12">
            <h1 class="font-serif text-3xl md:text-4xl uppercase tracking-widest mb-3">Porfolio de Trabajos Corporativos</h1>
            <div class="w-16 h-1 bg-purple-600 mx-auto"></div>
        </div>

        <!-- GRILLA DE VIDEOS (Se renderiza dinámicamente con JS) -->
        <div id="contenedor-videos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Los 6 apartados se inyectan acá automáticamente -->
        </div>
    </main>

    <!-- PIE DE PÁGINA -->
    <footer class="bg-white border-t border-gray-100 py-6 text-center text-xs text-gray-400 uppercase tracking-widest">
        &copy; 2026 Body Art Studio. Todos los derechos reservados.
    </footer>

    <!-- LÓGICA JAVASCRIPT -->
    <script>
        // ARRAY CON LOS 6 APARTADOS DE VÍDEOS E HISTORIAS
        // Reemplazá el ID largo de cada "youtubeId" por el tuyo.
        const listadoVideos = [
            {
                id: 1,
                titulo: "La historia del BodyArt",
                desc: "Conoce la historia de este increible arte.",
                youtubeId: "UrzxMb0qo5A" // <-- Reemplazá esto por el ID de tu video
            },
            {
                id: 2,
                titulo: "EL BODYPAITING COMO IDENTIDAD",
                desc: "¿Puede realmente el Bodypaiting ser el nuevo arte moderno que despierta personalidades?.",
                youtubeId: "ITntOGJpZCc"
            },
            {
                id: 3,
                titulo: "Madre Naturaleza - BodtPaiting completo",
                desc: "Experimenta la máxima evolución artística: una transformación inspirada en la Madre Naturaleza.",
                youtubeId: "BMU_-XbwpBY"
            },
            {
                id: 4,
                titulo: "6 TRUCOS DE BODYPAINTG",
                desc: "6 trucos y consejos para mejorar en tu arte corporal.",
                youtubeId: "kN6MyjRpWFM"
            },
            {
                id: 5,
                titulo: "GUIA DE BODYPAITING",
                desc: "Guia paso a paso del arte corporal.",
                youtubeId: "VJbYnDG2xdk"
            },
            {
                id: 6,
                titulo: "Masterclass de Brillantinas y Glitter",
                desc: "Técnicas de encapsulado y aplicación de destellos metalizados sobre diseños complejos tridimensionales.",
                youtubeId: "vTBhhdWjL3g"
            }
        ];

        // Función para renderizar los videos en la grilla
        function renderizarVideos() {
            const contenedor = document.getElementById('contenedor-videos');
            contenedor.innerHTML = ''; // Limpiar contenedor

            listadoVideos.forEach(video => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-lg shadow-sm border border-gray-100 overflow-hidden transition hover:shadow-md";

                card.innerHTML = `
                    <div class="relative aspect-video w-full bg-black">
                        <iframe 
                            class="absolute inset-0 w-full h-full" 
                            src="https://www.youtube.com/embed/${video.youtubeId}" 
                            title="${video.titulo}" 
                            frameborder="0" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                            allowfullscreen>
                        </iframe>
                    </div>
                    <div class="p-5">
                        <h3 class="font-bold text-gray-900 uppercase tracking-wide text-sm mb-2 font-sans">${video.titulo}</h3>
                        <p class="text-xs text-gray-500 leading-relaxed">${video.desc}</p>
                    </div>
                `;
                contenedor.appendChild(card);
            });
        }

        // Ejecutar render al cargar la página
        renderizarVideos();

        // Código de Sesión Global y Carrito
        const carrito = JSON.parse(localStorage.getItem('carrito-bodyart')) || [];
        const totalItems = carrito.reduce((acc, item) => acc + item.cantidad, 0);
        if (totalItems > 0) {
            const badge = document.getElementById('cart-badge');
            badge.innerText = totalItems;
            badge.classList.remove('hidden');
            badge.classList.add('inline-flex');
        }

        function chequearSesionGlobal() {
            const usuarioLogueado = JSON.parse(localStorage.getItem('usuario-sesion'));
            if(usuarioLogueado) {
                document.getElementById('nav-login-text').innerText = usuarioLogueado.email === 'admin@bodyart.com' ? 'Admin' : usuarioLogueado.nombre;
            }
        }
    </script>
</body>
</html>
