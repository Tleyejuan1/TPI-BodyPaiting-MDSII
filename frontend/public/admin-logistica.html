<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Phase Admin - Envíos</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen flex flex-col uppercase text-xs tracking-wider" onload="cargarPedidosAdmin();">

    <header class="bg-white border-b border-gray-200 h-20 flex justify-between items-center px-8 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-purple-600 text-white rounded-full flex items-center justify-center font-bold text-sm">BA</div>
            <h1 class="font-bold text-gray-900 tracking-widest text-sm">Consola Administrativa</h1>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full flex-grow space-y-6">
        <nav class="bg-white border-b border-gray-200 flex flex-wrap text-xs font-medium uppercase tracking-wider">
            <a href="admin-dashboard.html" class="p-4 text-gray-400 hover:text-gray-600 flex items-center gap-2"><i class="fa-solid fa-warehouse"></i> Inventario</a>
            <a href="admin-alta-productos.html" class="p-4 text-gray-400 hover:text-gray-600 flex items-center gap-2"><i class="fa-solid fa-square-plus"></i> Publicar Insumo</a>
            <a href="admin-logistica.html" class="p-4 text-purple-600 border-b-2 border-purple-600 flex items-center gap-2 font-bold"><i class="fa-solid fa-truck-ramp-box"></i> Envíos</a>
            <a href="admin-cupones.html" class="p-4 text-gray-400 hover:text-gray-600 flex items-center gap-2"><i class="fa-solid fa-ticket"></i> Cupones Club</a>
            <a href="admin-porfolio.html" class="p-4 text-gray-400 hover:text-gray-600 flex items-center gap-2"><i class="fa-solid fa-photo-film"></i> Porfolio Videos</a>
        </nav>

        <div class="space-y-4">
            <div class="bg-white border border-gray-200 rounded-sm p-4 font-bold text-gray-900"><i class="fa-solid fa-truck"></i> Despachos Recientes en Cola</div>
            <div class="bg-white border border-gray-200 rounded-sm overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-200 font-bold text-gray-400 text-[10px]">
                            <th class="p-4 w-28">N° Orden</th>
                            <th>Cliente</th>
                            <th>Bulto / Detalle</th>
                            <th class="p-4 w-48">Guía Tracking</th>
                            <th class="p-4 w-36">Estado Actual</th>
                            <th class="p-4 w-52 text-center">Modificar Estado</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-pedidos-admin" class="divide-y font-medium text-gray-600 text-[11px] normal-case"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="mail-service.js"></script>
    <script src="admin-controller.js"></script>
</body>
</html>
