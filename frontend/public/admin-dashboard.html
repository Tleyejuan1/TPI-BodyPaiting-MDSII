<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Phase Admin - Inventario</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen flex flex-col uppercase text-xs tracking-wider" onload="cargarInventarioCompletoPanoramico();">

    <header class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-purple-600 text-white rounded-full flex items-center justify-center font-bold text-sm">BA</div>
                <div>
                    <h1 class="font-bold text-gray-900 tracking-widest text-sm">Consola Administrativa</h1>
                    <p class="text-[10px] text-purple-600 font-bold tracking-normal lowercase">Área de Gestión Corporativa</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <a href="productos.html" class="text-gray-500 hover:text-purple-600 font-bold text-[10px]">Ver Sitio Público</a>
                <button onclick="cerrarSesion()" class="bg-gray-900 hover:bg-red-600 text-white font-bold px-4 py-2 rounded-sm cursor-pointer transition"><i class="fa-solid fa-power-off"></i> Salir</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full flex-grow space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-white p-5 rounded-sm border border-gray-200 flex items-center justify-between shadow-xs">
                <div>
                    <p class="text-gray-900 font-bold text-[10px] tracking-wide">Líneas Saludables</p>
                    <p id="contador-stock-ok" class="text-2xl font-bold text-gray-900 mt-1">0</p>
                </div>
                <div class="text-green-600 text-base"><i class="fa-solid fa-circle-check"></i></div>
            </div>
            <div class="bg-white p-5 rounded-sm border border-gray-200 flex items-center justify-between shadow-xs">
                <div>
                    <p class="text-gray-900 font-bold text-[10px] tracking-wide">Líneas Críticas</p>
                    <p id="contador-stock-critico" class="text-2xl font-bold text-amber-600 mt-1">0</p>
                </div>
                <div class="text-amber-600 text-base animate-pulse"><i class="fa-solid fa-triangle-exclamation"></i></div>
            </div>
            <div class="bg-white p-5 rounded-sm border border-gray-200 flex items-center justify-between shadow-xs">
                <div>
                    <p class="text-gray-900 font-bold text-[10px] tracking-wide">Quiebres de Stock</p>
                    <p id="contador-stock-cero" class="text-2xl font-bold text-red-600 mt-1">0</p>
                </div>
                <div class="text-red-600 text-base"><i class="fa-solid fa-box-open"></i></div>
            </div>
        </div>

        <nav class="bg-white border border-gray-200 rounded-sm flex flex-wrap text-xs font-semibold uppercase tracking-wider shadow-xs">
            <a href="admin-dashboard.html" class="p-4 text-purple-600 border-b-2 border-purple-600 flex items-center gap-2 font-bold"><i class="fa-solid fa-warehouse"></i> Inventario</a>
            <a href="admin-alta-productos.html" class="p-4 text-gray-500 hover:text-purple-600 flex items-center gap-2 transition"><i class="fa-solid fa-square-plus"></i> Publicar Insumo</a>
            <a href="admin-logistica.html" class="p-4 text-gray-500 hover:text-purple-600 flex items-center gap-2 transition"><i class="fa-solid fa-truck-ramp-box"></i> Envíos</a>
            <a href="admin-cupones.html" class="p-4 text-gray-500 hover:text-purple-600 flex items-center gap-2 transition"><i class="fa-solid fa-ticket"></i> Cupones Club</a>
            <a href="admin-porfolio.html" class="p-4 text-gray-500 hover:text-purple-600 flex items-center gap-2 transition"><i class="fa-solid fa-photo-film"></i> Porfolio Videos</a>
        </nav>

        <div class="space-y-4">
            <div class="bg-white border border-gray-200 rounded-sm p-4 flex flex-col sm:flex-row justify-between items-center gap-4 shadow-xs">
                <div class="font-bold text-gray-900"><i class="fa-solid fa-list-check"></i> Monitor Global de Stock</div>
                <input type="text" id="buscador-inventario" onkeyup="filtrarTablaInventarioGeneral()" placeholder="Buscar por código o insumo..." class="border border-gray-300 p-2 bg-white rounded-sm focus:border-purple-600 outline-none font-medium text-gray-700 w-72 uppercase text-xs tracking-normal">
            </div>
            
            <div class="bg-white border border-gray-200 rounded-sm overflow-x-auto shadow-xs">
                <table class="w-full text-left border-collapse min-w-[700px]">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-200 font-bold text-gray-800 text-[10px] tracking-wider">
                            <th class="p-4 w-16">Vista</th>
                            <th class="p-4 w-28">Código</th>
                            <th>Descripción</th>
                            <th class="p-4 w-24">Stock</th>
                            <th class="p-4 w-28">Estado</th>
                            <th class="p-4 w-24">Precio</th>
                            <th class="p-4 w-44 text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-inventario-panoramica" class="divide-y divide-gray-100 font-bold text-gray-900 text-[11px] normal-case tracking-normal">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="mail-service.js"></script>
    <script src="admin-controller.js"></script>
</body>
</html>
