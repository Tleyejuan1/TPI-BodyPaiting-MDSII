<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Body Art - Turnos y Citas</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0;1&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col justify-between" onload="chequearSesionGlobal()">

    <nav class="bg-white border-b border-gray-100 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex-shrink-0 flex items-center">
                    <a href="index.html" class="flex items-center gap-2 cursor-pointer">
                        <div class="w-12 h-12 rounded-full border-2 border-purple-600 flex items-center justify-center font-bold text-gray-800 text-sm">BODY</div>
                        <span class="font-serif tracking-widest text-xl font-bold hidden sm:block">ART</span>
                    </a>
                </div>
                <div class="hidden md:flex space-x-8 text-xs font-medium tracking-widest uppercase">
                    <a href="index.html" class="text-gray-500 hover:text-purple-600 transition">Hogar</a>
                    <a href="productos.html" class="text-gray-500 hover:text-purple-600 transition">Comercio / Kits</a>
                    <a href="videos.html" class="text-gray-500 hover:text-purple-600 transition">Vídeos e Historias</a>
                    <a href="contacto.html" class="text-purple-600 font-bold transition">Contacto y Reservas</a>
                </div>
                <div class="flex items-center space-x-6">
                    <a href="productos.html?ver-carrito=true" class="relative p-2 text-gray-600 hover:text-purple-600 transition cursor-pointer">
                        <i class="fa-solid fa-shopping-cart text-xl"></i>
                        <span id="cart-badge" class="absolute -top-1 -right-1 hidden items-center justify-center px-2 py-0.5 text-xs font-bold leading-none text-white bg-purple-600 rounded-full">0</span>
                    </a>
                    <a href="login.html" id="nav-login-btn" class="hidden md:flex items-center gap-2 text-xs font-medium tracking-widest uppercase text-gray-600 hover:text-purple-600 border border-gray-300 rounded-full px-4 py-2 hover:border-purple-600 cursor-pointer">
                        <i class="fa-solid fa-user"></i>
                        <span id="nav-login-text">Ingresar</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-4 py-12 flex-grow w-full">
        <div class="bg-white p-8 border border-gray-200 rounded-sm shadow-sm">
            <h2 class="font-serif text-2xl uppercase tracking-wider mb-6 text-center">Reserva tu Sesión Artística</h2>
            <form onsubmit="alert('Enviando datos de reserva a Spring Boot...'); return false;" class="space-y-4">
                <div>
                    <label class="block text-xs uppercase tracking-wider text-gray-600 font-bold mb-1">Nombre Completo</label>
                    <input type="text" required class="w-full border border-gray-300 p-3 rounded-sm bg-white focus:outline-none focus:border-purple-600">
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-wider text-gray-600 font-bold mb-1">Tipo de Evento</label>
                    <select class="w-full border border-gray-300 p-3 rounded-sm bg-white focus:outline-none focus:border-purple-600">
                        <option>Fotografía Artística Comercial</option>
                        <option>Exposición / Performance en Vivo</option>
                        <option>Maquillaje Fantástico</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-wider text-gray-600 font-bold mb-1">Detalles del Diseño</label>
                    <textarea rows="4" class="w-full border border-gray-300 p-3 rounded-sm bg-white focus:outline-none focus:border-purple-600"></textarea>
                </div>
                <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white text-xs font-bold uppercase tracking-widest py-4 transition rounded-sm cursor-pointer">Enviar Solicitud de Reserva</button>
            </form>
        </div>
    </main>

    <footer class="bg-white border-t border-gray-100 py-6 text-center text-xs text-gray-400 uppercase tracking-widest">
        &copy; 2026 Body Art Studio. Todos los derechos reservados.
    </footer>

    <script>
        const carrito = JSON.parse(localStorage.getItem('carrito-bodyart')) || [];
        const totalItems = carrito.reduce((acc, item) => acc + item.cantidad, 0);
        if (totalItems > 0) {
            const badge = document.getElementById('cart-badge');
            badge.innerText = totalItems; badge.className = "absolute -top-1 -right-1 inline-flex items-center justify-center px-2 py-0.5 text-xs font-bold text-white bg-purple-600 rounded-full";
        }

        function chequearSesionGlobal() {
            const usuarioLogueado = JSON.parse(localStorage.getItem('usuario-sesion'));
            if(usuarioLogueado) {
                document.getElementById('nav-login-text').innerText = usuarioLogueado.email === 'admin@bodyart.com' ? 'Admin' : usuarioLogueado.nombre;
            }
        }
    </script>
</body>
</html>
